version: 2
updates:
  # npm / pnpm workspace dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00" # trunk-ignore(yamllint/quoted-strings)
      timezone: UTC

    cooldown:
      default-days: 7
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3

    open-pull-requests-limit: 5

    labels:
      - dependencies
      - automated

    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)

    groups:
      frontend-core:
        applies-to: version-updates
        patterns:
          - next
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
          - "@t3-oss/env-nextjs"
          - "@vercel/*"
        update-types:
          - minor
          - patch

      web3-stack:
        applies-to: version-updates
        patterns:
          - wagmi
          - viem
          - "@wagmi/*"
          - "@rainbow-me/*"
          - "@metamask/*"
          - ethers
          - "@mento-protocol/mento-sdk"
        update-types:
          - minor
          - patch

      ui-styling:
        applies-to: version-updates
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - postcss
          - lucide-react
          - next-themes
          - react-hook-form
          - sonner
          - jotai
          - zod
        update-types:
          - minor
          - patch

      tooling:
        applies-to: version-updates
        dependency-type: development

      security-runtime:
        applies-to: security-updates
        dependency-type: production

      security-tooling:
        applies-to: security-updates
        dependency-type: development

    # Handle high-blast-radius major upgrades intentionally.
    ignore:
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: wagmi
        update-types: [version-update:semver-major]
      - dependency-name: viem
        update-types: [version-update:semver-major]
      - dependency-name: "@tanstack/react-query"
        update-types: [version-update:semver-major]
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
      - dependency-name: "@rainbow-me/rainbowkit"
        update-types: [version-update:semver-major]
      - dependency-name: turbo
        update-types: [version-update:semver-major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00" # trunk-ignore(yamllint/quoted-strings)
      timezone: UTC

    cooldown:
      default-days: 7

    open-pull-requests-limit: 3

    labels:
      - dependencies
      - github-actions
      - automated

    commit-message:
      prefix: chore(ci)

    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
