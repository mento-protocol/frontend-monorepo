name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        # Pin to a commit SHA to match the repository's Actions hardening posture.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enforce allow-ghsas expiry
        # dependency-review-action has no native expiry for allow-ghsas, so
        # enforce it here: fail the workflow on/after the expiry until the
        # allowlist below is re-evaluated. Keep this date in sync with the
        # matching osv-scanner.toml ignoreUntil for the protobufjs 6.x advisories.
        # Renewed 2026-06-05 → 2026-09-01 (90 days).
        run: |
          expiry=2026-09-01
          today=$(date -u +%Y-%m-%d)
          if [ "$today" \> "$expiry" ] || [ "$today" = "$expiry" ]; then
            echo "::error::allow-ghsas expiry reached ($expiry). Re-evaluate the protobufjs 6.x advisories in .github/workflows/dependency-review.yml and osv-scanner.toml before bumping the expiry."
            exit 1
          fi

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          # Mirrors the protobufjs 6.x ignores that affect both scanners.
          # OSV-only metadata corrections are not allowlisted here.
          # protobufjs 6.x advisories: no safe fix path; only remaining consumer is
          # deprecated/unmaintained @confio/ics23@0.6.8 in the wormhole-connect/Cosmos
          # stack, which declares protobufjs ^6.8.8. Forcing 7.x is a semver-major
          # jump that risks silent IBC proof corruption.
          # Expiry is enforced by the "Enforce allow-ghsas expiry" step above.
          allow-ghsas: GHSA-xq3m-2v4x-88gg,GHSA-f38q-mgvj-vph7,GHSA-wcpc-wj8m-hjx6
