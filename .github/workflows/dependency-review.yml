name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        # Pin to a commit SHA to match the repository's Actions hardening posture.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          # Mirrors osv-scanner.toml ignores. Keep both in sync.
          # GHSA-xq3m-2v4x-88gg: protobufjs 6.x — no safe fix path; only consumer
          # is the deprecated/unmaintained @confio/ics23@0.6.8 in the
          # wormhole-connect/Cosmos stack, which declares protobufjs ^6.8.8.
          # Forcing 7.x is a semver-major jump that risks silent IBC proof corruption.
          allow-ghsas: GHSA-xq3m-2v4x-88gg
