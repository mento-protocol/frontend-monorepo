name: Quality Budgets

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_STORAGE_URL: https://example.com
  NEXT_PUBLIC_ANALYTICS_API_URL: ${{ vars.ANALYTICS_API_URL }}
  NEXT_PUBLIC_WALLET_CONNECT_ID: test
  NEXT_PUBLIC_SENTRY_DSN_SWAP: ""
  NEXT_PUBLIC_SENTRY_DSN_RESERVE: ""
  NEXT_PUBLIC_SENTRY_DSN_GOVERNANCE: ""
  SENTRY_AUTH_TOKEN: ""
  CHAINALYSIS_API_KEY: ""
  ETHERSCAN_API_KEY: test
  NEXT_PUBLIC_BLOCKSCOUT_API_URL: https://example.com
  NEXT_PUBLIC_BLOCKSCOUT_GRAPHQL_URL: https://example.com/graphql
  NEXT_PUBLIC_BLOCKSCOUT_GRAPHQL_URL_CELO_SEPOLIA: https://example.com/graphql
  NEXT_PUBLIC_ETHERSCAN_API_URL: https://example.com
  NEXT_PUBLIC_GRAPH_API_KEY: test
  NEXT_PUBLIC_SUBGRAPH_URL: https://example.com/subgraph
  NEXT_PUBLIC_SUBGRAPH_URL_CELO_SEPOLIA: https://example.com/subgraph
  NEXT_PUBLIC_VERCEL_ENV: production

jobs:
  quality-budgets:
    name: coverage and production bundles
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm dependencies
        uses: ./.github/actions/pnpm-install

      - name: Enforce coverage and production bundle budgets
        run: pnpm quality:budgets
