name: Smoke Test - App Mento
on:
  deployment_status:

permissions:
  contents: read
  deployments: read
  pull-requests: write
  id-token: write

jobs:
  test-eligibility:
    uses: ./.github/workflows/smoke-test-eligibility.yml
    with:
      target_url_pattern: appmento

  test:
    needs: test-eligibility
    if: needs.test-eligibility.outputs.should_run == 'true'
    # pin: bump deliberately — gh api repos/mento-protocol/mento-automation-tests/commits/main --jq .sha
    # NOTE: upstream still calls base-test.yml@main internally with CHECKOUT_REF: main,
    # so this pin covers only the caller layer until upstream plumbs a CHECKOUT_REF input.
    uses: mento-protocol/mento-automation-tests/.github/workflows/app-mento-smoke-test.yml@af89f97322777f0001ed23b888e8160517591f0a
    with:
      CUSTOM_URL: ${{ github.event.deployment_status.environment_url }}
      IS_MAINNET: false
    secrets: inherit

  summary:
    needs: [test-eligibility, test]
    if: always() && needs.test-eligibility.outputs.should_run == 'true'
    uses: ./.github/workflows/smoke-test-summary.yml
    with:
      test_result: ${{ needs.test.result }}
      app_name: App Mento
      deployment_url: ${{ github.event.deployment_status.environment_url }}
      deployment_sha: ${{ github.event.deployment.sha }}
