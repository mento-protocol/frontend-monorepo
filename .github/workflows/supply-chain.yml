name: Supply Chain

# Dependency supply-chain gates, decoupled from trunk so the pre-push hook
# never blocks on lockfile CVEs (see .trunk/trunk.yaml — osv-scanner ignores
# the dependency lockfiles). Six jobs:
#
#   1. osv              — osv-scanner against the application lockfile, reading
#                         the repository-wide osv-scanner.toml.
#   2. osv-pnpm-runtime — a separately configured scan of the exact isolated
#                         trusted-tool lockfile. Its config contains only the
#                         short-lived pnpm metadata correction, so that advisory
#                         cannot mask a vulnerable pnpm elsewhere in the repo.
#   3. osv-vercel-cli-runtime — scans the standalone Vercel CLI lockfile with
#                               only its two package-name false positives.
#   4. osv-pnpm-bootstrap — scans the exact npm-locked Linux bootstrap artifact
#                           without sharing the pnpm-runtime suppression.
#                           All scans run on every PR + a daily cron (24h
#                           disclosure backstop for new CVEs and expired ignores).
#   5. lockfile-lint    — sha512 integrity + registry-poisoning gate, plus a
#                         real Linux npm-ci proof for the bootstrap lock.
#   6. version-skew     — every cataloged dep is "catalog:" or the exact catalog
#                         version (no silent drift off the shared catalog).
#
# Repository-wide suppressions live in osv-scanner.toml. Advisories suppressed
# across configured scanners must stay in sync with the `allow-ghsas` list in
# dependency-review.yml and its expiry. Scanner-specific metadata false
# positives remain OSV-only beside their exact lockfile, with source evidence
# and a short `ignoreUntil`.
#
# No path filter on `pull_request`: the osv job is meant to be a required check,
# and a path-filtered required check that gets skipped sits "pending" forever
# and blocks merges. The jobs are cheap enough to run on every PR.
# Scheduled failures are handled by ci-failure-notifier.yml, which owns the
# repository-wide deduplicated failure issue lifecycle.

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily so a newly-disclosed CVE against a pinned dep is caught within 24h.
    - cron: 17 6 * * *
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  osv:
    name: osv-scanner
    permissions:
      actions: read
      contents: read
      security-events: write # upload SARIF to the Security tab
    # Pinned to v2.3.8. scan-args is scoped to the lockfile + the repo config:
    # with --lockfile, osv-scanner does NOT auto-discover osv-scanner.toml, so
    # --config is required. node_modules is gitignored and not scanned.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --config=osv-scanner.toml
        --lockfile=pnpm-lock.yaml
      # SARIF upload needs `security-events: write`, which Dependabot and forked
      # `pull_request` runs don't get (read-only GITHUB_TOKEN) — uploading there
      # fails the check even when the scan passes. Upload only on schedule/main
      # runs; PRs still block via fail-on-vuln (default true).
      upload-sarif: ${{ github.event_name != 'pull_request' }}

  osv-pnpm-runtime:
    name: osv-scanner (trusted pnpm runtime)
    permissions:
      actions: read
      contents: read
      security-events: write
    # Keep the malformed-advisory correction scoped to this exact one-package
    # lockfile instead of suppressing the GHSA repository-wide.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --config=scripts/vercel-pnpm-runtime/osv-scanner.toml
        --lockfile=scripts/vercel-pnpm-runtime/pnpm-lock.yaml
      upload-sarif: ${{ github.event_name != 'pull_request' }}

  osv-vercel-cli-runtime:
    name: osv-scanner (standalone Vercel CLI runtime)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --config=scripts/vercel-cli-runtime/osv-scanner.toml
        --lockfile=scripts/vercel-cli-runtime/pnpm-lock.yaml
      upload-sarif: ${{ github.event_name != 'pull_request' }}

  osv-pnpm-bootstrap:
    name: osv-scanner (trusted pnpm bootstrap)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=scripts/vercel-pnpm-bootstrap/package-lock.json
      upload-sarif: ${{ github.event_name != 'pull_request' }}

  lockfile-lint:
    name: lockfile integrity + registry
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: lockfile-lint self-tests
        run: node scripts/lockfile-lint.test.mjs
      - name: lockfile integrity + registry check
        run: npm run supply-chain:lockfile-lint
      - name: Install and authenticate the Linux pnpm bootstrap
        working-directory: scripts/vercel-pnpm-bootstrap
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          pnpm_binary=node_modules/@pnpm/linux-x64/pnpm
          test -f "$pnpm_binary"
          test ! -L "$pnpm_binary"
          echo "e02c01738ce850754cf00111fd97bec24de550e1e963690486f02d9dae1a2193  $pnpm_binary" |
            sha256sum --check --strict
          "$pnpm_binary" --version | grep -Fxq "10.34.4"

  version-skew:
    name: catalog version-skew
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: version-skew self-tests
        run: node scripts/version-skew-check.test.mjs
      - name: catalog version-skew check
        run: node scripts/version-skew-check.mjs
