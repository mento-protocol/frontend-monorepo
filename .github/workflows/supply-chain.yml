name: Supply Chain

# Dependency supply-chain gates, decoupled from trunk so the pre-push hook
# never blocks on lockfile CVEs (see .trunk/trunk.yaml — osv-scanner ignores
# pnpm-lock.yaml). Three jobs:
#
#   1. osv         — osv-scanner against pnpm-lock.yaml, reading osv-scanner.toml
#                    (the source of truth for suppressed/expired advisories).
#                    Runs on every PR + a daily cron (24h disclosure backstop:
#                    re-surfaces a newly-disclosed CVE or an expired ignoreUntil
#                    even when no PR touches the lockfile).
#   2. lockfile-lint — sha512 integrity + registry-poisoning gate.
#   3. version-skew  — every cataloged dep is "catalog:" or the exact catalog
#                      version (no silent drift off the shared catalog).
#
# Suppressions live in osv-scanner.toml. Note they must stay in sync with the
# `allow-ghsas` list in dependency-review.yml (and its expiry date) — both gate
# the same advisories from different angles.
#
# No path filter on `pull_request`: the osv job is meant to be a required check,
# and a path-filtered required check that gets skipped sits "pending" forever
# and blocks merges. The jobs are cheap enough to run on every PR.

on:
  pull_request:
    branches: [main]
  schedule:
    # Daily so a newly-disclosed CVE against a pinned dep is caught within 24h.
    - cron: 17 6 * * *
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: true

permissions: read-all

jobs:
  osv:
    name: osv-scanner
    permissions:
      actions: read
      contents: read
      security-events: write # upload SARIF to the Security tab
    # Pinned to v2.3.8. scan-args is scoped to the lockfile + the repo config:
    # with --lockfile, osv-scanner does NOT auto-discover osv-scanner.toml, so
    # --config is required. node_modules is gitignored and not scanned.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --config=osv-scanner.toml
        --lockfile=pnpm-lock.yaml
      # SARIF upload needs `security-events: write`, which Dependabot and forked
      # `pull_request` runs don't get (read-only GITHUB_TOKEN) — uploading there
      # fails the check even when the scan passes. Upload only on schedule/main
      # runs; PRs still block via fail-on-vuln (default true).
      upload-sarif: ${{ github.event_name != 'pull_request' }}

  lockfile-lint:
    name: lockfile integrity + registry
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: lockfile-lint self-tests
        run: node scripts/lockfile-lint.test.mjs
      - name: lockfile integrity + registry check
        run: node scripts/lockfile-lint.mjs

  version-skew:
    name: catalog version-skew
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: version-skew self-tests
        run: node scripts/version-skew-check.test.mjs
      - name: catalog version-skew check
        run: node scripts/version-skew-check.mjs

  # Frontend has no Slack/notify workflow, so a failing daily cron would be
  # silent — defeating the disclosure backstop. Surface scheduled failures by
  # opening/updating a tracking issue.
  cron-failure-issue:
    name: report scheduled failure
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs: [osv, lockfile-lint, version-skew]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or update the supply-chain failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = "<!-- supply-chain-cron-failure -->";
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const body =
              `The daily **Supply Chain** scan failed on \`main\`.\n\n` +
              `This usually means a newly-disclosed CVE against a pinned dependency, ` +
              `or an \`ignoreUntil\` in \`osv-scanner.toml\` has expired.\n\n` +
              `[Failed run](${runUrl})\n\n` +
              `Triage: re-run \`osv-scanner scan source --lockfile=pnpm-lock.yaml ` +
              `--config=osv-scanner.toml\` locally, then either bump the dep / add a ` +
              `\`pnpm.overrides\` floor, or renew the \`osv-scanner.toml\` ignore with ` +
              `a fresh justification + expiry.\n\n${marker}`;
            const existing = (
              await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                labels: "supply-chain",
                per_page: 100,
              })
            ).find((issue) => issue.body && issue.body.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Daily scan failed again — [run](${runUrl}).`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Supply Chain: daily scan failing",
                body,
                labels: ["supply-chain", "dependencies"],
              });
            }
