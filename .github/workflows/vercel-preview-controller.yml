name: Vercel Preview Controller
run-name: >-
  ${{ github.event_name == 'pull_request_target' &&
  format('Vercel preview controller event | id={0} | number={1} | pr={2} | sha={3} | before={4} | action={5} | receipt={6}', github.run_id, github.run_number, github.event.pull_request.number, github.event.pull_request.head.sha, github.event.action == 'synchronize' && github.event.before || 'none', github.event.action, github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.ref != 'dependabot' && !startsWith(github.event.pull_request.head.ref, 'dependabot/') && (github.event.action != 'edited' || github.event.changes.base != null)) ||
  format('Vercel Preview Controller | event={0} | id={1}', github.event_name, github.run_id) }}

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, closed]
  repository_dispatch:
    types: [vercel-preview-bootstrap, vercel-preview-reconcile]
  workflow_run:
    workflows: [Vercel Preview Worker, Vercel Preview Intake]
    types: [completed]

permissions: {}

env:
  VERCEL_PREVIEW_CONTROLLER_MODE: active

jobs:
  validate-request:
    name: Validate default-branch repository request
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      operation: ${{ steps.request.outputs.operation }}
      pr_number: ${{ steps.request.outputs.pr_number }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Validate repository dispatch type and payload
        id: request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { writeRepositoryDispatchOutputs } = await import(moduleUrl.href);
            writeRepositoryDispatchOutputs({ payload: context.payload, core });

  snapshot-event:
    name: Snapshot immutable PR event
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action != 'edited' || github.event.changes.base != null)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      snapshot: ${{ steps.snapshot.outputs.snapshot }}
      pr_number: ${{ steps.snapshot.outputs.pr_number }}
      trusted_base_sha: ${{ steps.snapshot.outputs.trusted_base_sha }}
      change_base_sha: ${{ steps.snapshot.outputs.change_base_sha }}
      head_sha: ${{ steps.snapshot.outputs.head_sha }}
      trust: ${{ steps.snapshot.outputs.trust }}
      plan_required: ${{ steps.snapshot.outputs.plan_required }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Validate and snapshot event payload
        id: snapshot
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { writeEventSnapshotOutputs } = await import(moduleUrl.href);
            writeEventSnapshotOutputs({
              payload: context.payload,
              runId: context.runId,
              runNumber: context.runNumber,
              core,
            });

  plan-event:
    name: Plan preview runtime impact from trusted base
    needs: snapshot-event
    if: needs.snapshot-event.outputs.plan_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Check out immutable trusted workflow source with full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Materialize exact trusted base and fetch candidate object
        env:
          HEAD_SHA: ${{ needs.snapshot-event.outputs.head_sha }}
          TRUSTED_BASE_SHA: ${{ needs.snapshot-event.outputs.trusted_base_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          git -C source cat-file -e "$WORKFLOW_SHA^{commit}"
          git -C source cat-file -e "$TRUSTED_BASE_SHA^{commit}"
          git -C source merge-base --is-ancestor "$TRUSTED_BASE_SHA" "$WORKFLOW_SHA"
          git -C source checkout --detach "$TRUSTED_BASE_SHA"
          test "$(git -C source rev-parse HEAD)" = "$TRUSTED_BASE_SHA"
          git -C source fetch --force --no-tags origin "$HEAD_SHA"
          git -C source cat-file -e "$HEAD_SHA^{commit}"

      - name: Set up pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.34.4

      - name: Set up pinned Node.js without dependency caching
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install trusted-base planner dependencies without lifecycle scripts
        working-directory: source
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Compute exact before-to-head deployment plan
        id: plan
        working-directory: source
        env:
          CHANGE_BASE_SHA: ${{ needs.snapshot-event.outputs.change_base_sha }}
          HEAD_SHA: ${{ needs.snapshot-event.outputs.head_sha }}
        run: |
          plan="$(node scripts/plan-vercel-deployments.mjs --base "$CHANGE_BASE_SHA" --head "$HEAD_SHA")"
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

  receipt-event:
    name: Persist immutable PR event receipt
    needs: [snapshot-event, plan-event]
    if: >-
      always() &&
      needs.snapshot-event.result == 'success' &&
      needs.snapshot-event.outputs.trust != 'dependabot'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.snapshot-event.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      pull-requests: write
      statuses: write
    outputs:
      pr_number: ${{ steps.receipt.outputs.pr_number }}
      reconcile_required: ${{ steps.receipt.outputs.reconcile_required }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Record immutable event and fail-closed plan
        id: receipt
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EVENT_SNAPSHOT: ${{ needs.snapshot-event.outputs.snapshot }}
          PLANNER_OUTCOME: ${{ needs.plan-event.result }}
          RAW_PLAN: ${{ needs.plan-event.outputs.plan }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { recordEventReceipt } = await import(moduleUrl.href);
            await recordEventReceipt({
              github,
              context,
              core,
              snapshotRaw: process.env.EVENT_SNAPSHOT,
              planRaw: process.env.RAW_PLAN,
              plannerOutcome: process.env.PLANNER_OUTCOME,
            });

  reconcile-event:
    name: Reconcile durable preview state
    needs: receipt-event
    if: >-
      always() &&
      needs.receipt-event.result == 'success' &&
      needs.receipt-event.outputs.reconcile_required == 'true'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.receipt-event.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      deployments: write
      pull-requests: write
      statuses: write
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Persist intents, recover or dispatch target workers, and publish statuses
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROLLER_MODE: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE }}
          PR_NUMBER: ${{ needs.receipt-event.outputs.pr_number }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORKER_DISPATCH_TOKEN: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE == 'active' && secrets.GH_PREVIEW_WORKFLOW_DISPATCH_TOKEN || '' }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { reconcilePreview } = await import(moduleUrl.href);
            const workerDispatchGithub = process.env.WORKER_DISPATCH_TOKEN
              ? getOctokit(process.env.WORKER_DISPATCH_TOKEN)
              : null;
            await reconcilePreview({
              github,
              workerDispatchGithub,
              context,
              core,
              controllerMode: process.env.CONTROLLER_MODE,
              prNumber: process.env.PR_NUMBER,
              workflowSha: process.env.WORKFLOW_SHA,
            });

  snapshot-bootstrap:
    name: Snapshot requested bootstrap
    needs: validate-request
    if: needs.validate-request.outputs.operation == 'bootstrap'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      snapshot: ${{ steps.snapshot.outputs.snapshot }}
      pr_number: ${{ steps.snapshot.outputs.pr_number }}
      trusted_base_sha: ${{ steps.snapshot.outputs.trusted_base_sha }}
      change_base_sha: ${{ steps.snapshot.outputs.change_base_sha }}
      head_sha: ${{ steps.snapshot.outputs.head_sha }}
      plan_required: ${{ steps.snapshot.outputs.plan_required }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Validate PR and create bootstrap snapshot
        id: snapshot
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ needs.validate-request.outputs.pr_number }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { prepareBootstrap } = await import(moduleUrl.href);
            await prepareBootstrap({
              github,
              context,
              core,
              prNumber: process.env.PR_NUMBER,
            });

  plan-bootstrap:
    name: Plan bootstrap preview runtime impact from trusted base
    needs: snapshot-bootstrap
    if: needs.snapshot-bootstrap.outputs.plan_required == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Check out immutable trusted workflow source with full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Materialize exact trusted base and fetch candidate object
        env:
          HEAD_SHA: ${{ needs.snapshot-bootstrap.outputs.head_sha }}
          TRUSTED_BASE_SHA: ${{ needs.snapshot-bootstrap.outputs.trusted_base_sha }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          git -C source cat-file -e "$WORKFLOW_SHA^{commit}"
          git -C source cat-file -e "$TRUSTED_BASE_SHA^{commit}"
          git -C source merge-base --is-ancestor "$TRUSTED_BASE_SHA" "$WORKFLOW_SHA"
          git -C source checkout --detach "$TRUSTED_BASE_SHA"
          test "$(git -C source rev-parse HEAD)" = "$TRUSTED_BASE_SHA"
          git -C source fetch --force --no-tags origin "$HEAD_SHA"
          git -C source cat-file -e "$HEAD_SHA^{commit}"

      - name: Set up pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 10.34.4

      - name: Set up pinned Node.js without dependency caching
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install trusted-base planner dependencies without lifecycle scripts
        working-directory: source
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Compute exact base-to-head bootstrap plan
        id: plan
        working-directory: source
        env:
          CHANGE_BASE_SHA: ${{ needs.snapshot-bootstrap.outputs.change_base_sha }}
          HEAD_SHA: ${{ needs.snapshot-bootstrap.outputs.head_sha }}
        run: |
          plan="$(node scripts/plan-vercel-deployments.mjs --base "$CHANGE_BASE_SHA" --head "$HEAD_SHA")"
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

  receipt-bootstrap:
    name: Persist immutable bootstrap receipt
    needs: [snapshot-bootstrap, plan-bootstrap]
    if: always() && needs.snapshot-bootstrap.result == 'success'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.snapshot-bootstrap.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      pull-requests: write
      statuses: write
    outputs:
      pr_number: ${{ steps.receipt.outputs.pr_number }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Record immutable bootstrap event and fail-closed plan
        id: receipt
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EVENT_SNAPSHOT: ${{ needs.snapshot-bootstrap.outputs.snapshot }}
          PLANNER_OUTCOME: ${{ needs.plan-bootstrap.result }}
          RAW_PLAN: ${{ needs.plan-bootstrap.outputs.plan }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { recordEventReceipt } = await import(moduleUrl.href);
            await recordEventReceipt({
              github,
              context,
              core,
              snapshotRaw: process.env.EVENT_SNAPSHOT,
              planRaw: process.env.RAW_PLAN,
              plannerOutcome: process.env.PLANNER_OUTCOME,
            });

  reconcile-bootstrap:
    name: Reconcile bootstrapped preview state
    needs: receipt-bootstrap
    if: always() && needs.receipt-bootstrap.result == 'success'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.receipt-bootstrap.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      deployments: write
      pull-requests: write
      statuses: write
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Reconcile bootstrapped PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROLLER_MODE: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE }}
          PR_NUMBER: ${{ needs.receipt-bootstrap.outputs.pr_number }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORKER_DISPATCH_TOKEN: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE == 'active' && secrets.GH_PREVIEW_WORKFLOW_DISPATCH_TOKEN || '' }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { reconcilePreview } = await import(moduleUrl.href);
            const workerDispatchGithub = process.env.WORKER_DISPATCH_TOKEN
              ? getOctokit(process.env.WORKER_DISPATCH_TOKEN)
              : null;
            await reconcilePreview({
              github,
              workerDispatchGithub,
              context,
              core,
              controllerMode: process.env.CONTROLLER_MODE,
              prNumber: process.env.PR_NUMBER,
              workflowSha: process.env.WORKFLOW_SHA,
            });

  reconcile-request:
    name: Reconcile requested preview state
    needs: validate-request
    if: needs.validate-request.outputs.operation == 'reconcile'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.validate-request.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      deployments: write
      pull-requests: write
      statuses: write
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Reconcile requested PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROLLER_MODE: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE }}
          PR_NUMBER: ${{ needs.validate-request.outputs.pr_number }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORKER_DISPATCH_TOKEN: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE == 'active' && secrets.GH_PREVIEW_WORKFLOW_DISPATCH_TOKEN || '' }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { reconcilePreview } = await import(moduleUrl.href);
            const workerDispatchGithub = process.env.WORKER_DISPATCH_TOKEN
              ? getOctokit(process.env.WORKER_DISPATCH_TOKEN)
              : null;
            await reconcilePreview({
              github,
              workerDispatchGithub,
              context,
              core,
              controllerMode: process.env.CONTROLLER_MODE,
              prNumber: process.env.PR_NUMBER,
              workflowSha: process.env.WORKFLOW_SHA,
            });

  identify-dependabot-intake:
    name: Validate completed read-only Dependabot intake
    if: >-
      github.event_name == 'workflow_run' &&
      (
        github.event.workflow_run.path == '.github/workflows/vercel-preview-intake.yml' ||
        github.event.workflow_run.path == '.github/workflows/vercel-preview-intake.yml@main'
      ) &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.identity.outputs.pr_number }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Strictly validate read-only intake identity
        id: identity
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { validateDependabotIntakeWorkflowRun } = await import(moduleUrl.href);
            const parsed = validateDependabotIntakeWorkflowRun(context.payload.workflow_run);
            core.setOutput("pr_number", String(parsed.pr));

  publish-dependabot-unsupported:
    name: Publish unsupported status from trusted default-branch code
    needs: identify-dependabot-intake
    if: needs.identify-dependabot-intake.result == 'success'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.identify-dependabot-intake.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Re-query exact PR head and publish explicit unsupported status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { publishDependabotUnsupported } = await import(moduleUrl.href);
            await publishDependabotUnsupported({ github, context, core });

  identify-worker-result:
    name: Validate completed worker callback identity
    if: >-
      github.event_name == 'workflow_run' &&
      (
        github.event.workflow_run.path == '.github/workflows/vercel-preview-worker.yml' ||
        github.event.workflow_run.path == '.github/workflows/vercel-preview-worker.yml@main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.identity.outputs.pr_number }}
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Strictly parse worker display title
        id: identity
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const { parseWorkerRunName } = await import(moduleUrl.href);
            const parsed = parseWorkerRunName(context.payload.workflow_run.display_title);
            core.setOutput("pr_number", String(parsed.pr));

  recover-worker-result:
    name: Recover worker terminal evidence and continue reconciliation
    needs: identify-worker-result
    if: needs.identify-worker-result.result == 'success'
    concurrency:
      group: vercel-preview-state-pr-${{ needs.identify-worker-result.outputs.pr_number }}
      cancel-in-progress: false
      queue: max # trunk-ignore(actionlint/syntax-check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      deployments: write
      pull-requests: write
      statuses: write
    steps:
      - name: Check out trusted controller
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: controller
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Terminalize or recover Deployment and persist immutable result
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CONTROLLER_MODE: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORKER_DISPATCH_TOKEN: ${{ env.VERCEL_PREVIEW_CONTROLLER_MODE == 'active' && secrets.GH_PREVIEW_WORKFLOW_DISPATCH_TOKEN || '' }}
        with:
          script: |
            const { pathToFileURL } = require("node:url");
            const moduleUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/controller/scripts/vercel-preview-controller.mjs`,
            );
            const {
              postWorkerRecoveryError,
              recoverWorkerResult,
              reconcilePreview,
            } = await import(moduleUrl.href);
            const workerDispatchGithub = process.env.WORKER_DISPATCH_TOKEN
              ? getOctokit(process.env.WORKER_DISPATCH_TOKEN)
              : null;
            try {
              const result = await recoverWorkerResult({ github, context, core });
              if (result?.should_reconcile_current_epoch) {
                await reconcilePreview({
                  github,
                  workerDispatchGithub,
                  context,
                  core,
                  controllerMode: process.env.CONTROLLER_MODE,
                  prNumber: result.pr,
                  workflowSha: process.env.WORKFLOW_SHA,
                });
              }
            } catch (error) {
              await postWorkerRecoveryError({ github, context });
              throw error;
            }
