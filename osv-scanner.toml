# risk is low since we only use ethers for client-side read operations and contract interactions,
# not server-side key signing.
[[IgnoredVulns]]
id = "GHSA-848j-6mx2-7j84"
reason = "No patch available — transitive dep of ethers v5 (@ethersproject/signing-key). Low practical risk for client-side usage"

